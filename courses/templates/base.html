<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Uleeyy | Образовательная платформа IT-обучения{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #FFFFFF;
            color: #1F2937;
            line-height: 1.6;
        }

        /* ========== ХЕДЕР С ПЧЁЛКОЙ ========== */
        .header {
            background: white;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-bottom: 1px solid #E5E7EB;
        }

        .header-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: 700;
            color: #082567;
        }

        .logo-bee {
            background: #F59E0B;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 2px 8px rgba(245, 158, 11, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .logo-bee:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4);
        }

        .logo span {
            color: #F59E0B;
        }

        /* ========== КНОПКИ АВТОРИЗАЦИИ ========== */
        .auth-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn-login {
            padding: 8px 24px;
            background: transparent;
            color: #2563EB;
            border: 1px solid #2563EB;
            border-radius: 40px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-login:hover {
            background: #2563EB;
            color: white;
        }

        .btn-register {
            padding: 8px 24px;
            background: #2563EB;
            color: white;
            border: none;
            border-radius: 40px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-register:hover {
            background: #1D4ED8;
            transform: translateY(-1px);
        }

        .username {
            color: #1F2937;
            font-size: 14px;
            font-weight: 500;
        }

        .btn-logout {
            padding: 8px 20px;
            background: #F3F4F6;
            color: #6B7280;
            border: 1px solid #E5E7EB;
            border-radius: 40px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background: #FEE2E2;
            color: #DC2626;
            border-color: #FECACA;
        }

        .back-link {
            color: #6B7280;
            text-decoration: none;
            transition: color 0.3s ease;
            font-size: 0.9rem;
        }

        .back-link:hover {
            color: #F59E0B;
        }

        /* ========== ФУТЕР ========== */
        .footer {
            margin-top: 4rem;
            padding: 2rem 0;
            border-top: 1px solid #E5E7EB;
            text-align: center;
            color: #6B7280;
            font-size: 0.9rem;
        }

        .footer-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* ========== ГЛАВНЫЙ БАННЕР ========== */
        .hero {
            position: relative;
            min-height: 550px;
            background: linear-gradient(135deg, #082567 0%, #102FA1 100%);
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        .hero-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 3rem 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        .hero-content h1 {
            font-size: 3rem;
            font-weight: 700;
            color: white;
            margin-bottom: 1.5rem;
            line-height: 1.2;
        }

        .hero-content h1 span {
            color: #F59E0B;
        }

        .hero-content p {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.9);
            margin-bottom: 2rem;
        }

        .hero-stats {
            display: flex;
            gap: 2rem;
            margin-top: 2rem;
        }

        .stat-item {
            text-align: center;
            padding: 1rem 1.5rem;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: white;
        }

        .stat-label {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.8);
        }

        .code-preview {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #E5E7EB;
        }

        .preview-title {
            font-weight: 600;
            color: #1F2937;
        }

        .tab-group {
            display: flex;
            gap: 0.5rem;
        }

        .tab {
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            font-size: 0.8rem;
            background: #F3F4F6;
            border: none;
            cursor: pointer;
        }

        .tab.active {
            background: #082567;
            color: white;
        }

        .code-block {
            background: #1E1E1E;
            color: #D4D4D4;
            padding: 1rem;
            border-radius: 8px;
            font-family: 'Consolas', monospace;
            font-size: 0.8rem;
            line-height: 1.5;
            overflow-x: auto;
            transition: opacity 0.15s ease;
        }

        .code-comment { color: #6A9955; }
        .code-keyword { color: #569CD6; }
        .code-function { color: #DCDCAA; }
        .code-string { color: #CE9178; }

        /* ========== СЕКЦИЯ КУРСОВ ========== */
        .languages-section {
            max-width: 1280px;
            margin: 4rem auto;
            padding: 0 2rem;
        }

        .section-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .section-header h2 {
            font-size: 2rem;
            color: #1F2937;
            margin-bottom: 0.5rem;
        }

        .section-header p {
            color: #6B7280;
        }

        .languages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        /* Карточка курса */
        .language-card {
            background: white;
            border: 1px solid #E5E7EB;
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            display: block;
        }

        /* Эффект при наведении на карточку */
        .language-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            background: linear-gradient(135deg, #082567, #102FA1);
            border-color: #102FA1;
        }

        /* Текст названия курса при наведении */
        .language-card:hover .language-name {
            color: white;
        }

        /* Текст описания при наведении */
        .language-card:hover .language-description {
            color: rgba(255,255,255,0.8);
        }

        /* Тег "модулей" при наведении */
        .language-card:hover .feature-tag {
            background: rgba(255,255,255,0.2);
            color: #F59E0B;
        }

        /* Иконка при наведении */
        .language-card:hover .language-icon {
            background: white;
            color: #082567;
        }

        /* Иконка курса */
        .language-icon {
            width: 70px;
            height: 70px;
            margin: 0 auto 1rem;
            background: linear-gradient(135deg, #082567, #102FA1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            transition: all 0.3s ease;
        }

        /* Название курса */
        .language-name {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            transition: color 0.3s ease;
        }

        /* Описание курса */
        .language-description {
            color: #6B7280;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            transition: color 0.3s ease;
        }

        /* Тег с количеством модулей */
        .feature-tag {
            background: #E0E7FF;
            color: #082567;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .language-features {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        /* ========== АДАПТИВНОСТЬ ========== */
        @media (max-width: 768px) {
            .hero-container {
                grid-template-columns: 1fr;
                text-align: center;
            }
            
            .hero-content h1 {
                font-size: 2rem;
            }
            
            .hero-stats {
                justify-content: center;
            }
            
            .header-container {
                padding: 0.8rem 1rem;
                flex-direction: column;
                gap: 12px;
            }
            
            .logo {
                font-size: 1.2rem;
            }
            
            .logo-bee {
                width: 28px;
                height: 28px;
                font-size: 14px;
            }
            
            .auth-section {
                justify-content: center;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header class="header">
        <div class="header-container">
            <a href="/" class="logo">
                <div class="logo-bee">🐝</div>
                Uleeyy
            </a>
            
            <div class="auth-section">
                {% if user.is_authenticated %}
                    <span class="username">👋 {{ user.username }}</span>
                    <a href="{% url 'accounts:profile' %}" class="btn-login" style="background: #2563EB; color: white;">👤 Кабинет</a>
                    <a href="{% url 'accounts:logout' %}" class="btn-logout">Выйти</a>
                {% else %}
                    <a href="{% url 'accounts:login' %}" class="btn-login">Войти</a>
                    <a href="{% url 'accounts:register' %}" class="btn-register">Регистрация</a>
                {% endif %}
</div>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>


    {% block extra_js %}{% endblock %}
</body>
</html>
