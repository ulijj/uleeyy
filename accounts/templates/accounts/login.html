<!DOCTYPE html>
<html>
<head>
    <title>Вход | Uleeyy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #2563EB 0%, #1D4ED8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo-bee {
            background: #F59E0B;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 12px;
        }
        
        .logo-text {
            font-size: 24px;
            font-weight: 700;
            color: #2563EB;
        }
        
        .logo-text span {
            color: #F59E0B;
        }
        
        h2 {
            text-align: center;
            margin-bottom: 24px;
            color: #1F2937;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #374151;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #E5E7EB;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        input:focus {
            outline: none;
            border-color: #2563EB;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: #2563EB;
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        button:hover {
            background: #1D4ED8;
            transform: translateY(-1px);
        }
        
        .messages {
            margin-bottom: 20px;
        }
        
        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 12px;
        }
        
        .alert-success {
            background: #DCFCE7;
            color: #15803D;
            border: 1px solid #BBF7D0;
        }
        
        .alert-error, .alert-danger {
            background: #FEE2E2;
            color: #B91C1C;
            border: 1px solid #FECACA;
        }
        
        .alert-warning {
            background: #FEF3C7;
            color: #92400E;
            border: 1px solid #FDE68A;
        }
        
        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #6B7280;
            font-size: 14px;
        }
        
        .register-link a {
            color: #2563EB;
            text-decoration: none;
        }
        
        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-bee">🐝</div>
            <div class="logo-text">Ule<span>eyy</span></div>
        </div>
        
        <h2>Вход в аккаунт</h2>
        
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Имя пользователя</label>
                {{ form.username }}
            </div>
            
            <div class="form-group">
                <label>Пароль</label>
                {{ form.password }}
            </div>
            
            <button type="submit">Войти</button>
        </form>
        
        <div class="register-link">
            Нет аккаунта? <a href="{% url 'accounts:register' %}">Зарегистрироваться</a>
        </div>
    </div>
</body>
</html>
